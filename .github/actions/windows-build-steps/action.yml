name: windows-build-steps
runs:
  using: composite
  steps:
  - name: Add msbuild to PATH
    uses: microsoft/setup-msbuild@v1.3.1
  - name: ccache
    uses: hendrikmuhs/ccache-action@v1.2
    with:
      max-size: "10GB"
  - name: Configure and verify ccache
    shell: pwsh
    run: |
      ccache --set-config=base_dir=C:\a\rocksdb\rocksdb
      ccache --set-config=hash_dir=false
      echo "=== ccache directory status ==="
      if (Test-Path C:\a\rocksdb\rocksdb\.ccache) {
        $size = (Get-ChildItem -Recurse C:\a\rocksdb\rocksdb\.ccache | Measure-Object -Property Length -Sum).Sum / 1MB
        $count = (Get-ChildItem -Recurse C:\a\rocksdb\rocksdb\.ccache -File).Count
        echo "Cache restored: $count files, $([math]::Round($size, 1)) MB"
      } else {
        echo "Cache directory does not exist (cold start)"
      }
      echo "=== ccache config ==="
      ccache -p | Select-String "base_dir|hash_dir|cache_dir"
      echo "=== ccache stats before build ==="
      ccache -s
      ccache -z
  - name: Build rocksdb (ccache validation only)
    run: |-
      echo ======================== Build RocksDB =========================
      cd ${{ github.workspace }}
      mkdir build
      cd build
      & cmake -G "$Env:CMAKE_GENERATOR" -DCMAKE_BUILD_TYPE=Debug -DWIN_CI=1 -DPORTABLE="$Env:CMAKE_PORTABLE" -DWITH_TESTS=OFF -DWITH_BENCHMARK_TOOLS=OFF -DWITH_TOOLS=OFF ..
      if(!$?) { Exit $LASTEXITCODE }
      cd ..
      echo "Building rocksdb static lib only (ccache validation)"
      msbuild build/rocksdb.sln /m:32 /p:LinkIncremental=false -property:Configuration=Debug -property:Platform=x64 /t:rocksdb
      if(!$?) { Exit $LASTEXITCODE }
    shell: pwsh
  - name: Show ccache stats
    shell: pwsh
    run: |
      ccache --show-stats -v
