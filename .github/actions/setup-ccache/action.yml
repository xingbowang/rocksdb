name: setup-ccache
description: Setup ccache for faster C++ compilation caching
inputs:
  cache-key-prefix:
    description: Unique prefix for the cache key (e.g., 'build-linux')
    required: true
runs:
  using: composite
  steps:
    - name: Set ccache environment variables
      run: |
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $GITHUB_ENV
        echo "CCACHE_NOHASHDIR=true" >> $GITHUB_ENV
        echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
        echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
      shell: bash
    - name: Install ccache
      run: |
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install ccache || true
        elif ! which ccache; then
          apt-get update && apt-get install -y ccache 2>/dev/null || \
          sudo apt-get update && sudo apt-get install -y ccache
        fi
      shell: bash
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-${{ inputs.cache-key-prefix }}-${{ github.ref }}-${{ github.sha }}
        restore-keys: |-
          ccache-${{ inputs.cache-key-prefix }}-${{ github.ref }}-
          ccache-${{ inputs.cache-key-prefix }}-refs/heads/main-
          ccache-${{ inputs.cache-key-prefix }}-
    - name: Add ccache to PATH
      run: |
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          echo "$(brew --prefix ccache)/libexec" >> $GITHUB_PATH
        else
          echo "/usr/lib/ccache" >> $GITHUB_PATH
        fi
      shell: bash
    - name: Zero ccache stats
      run: ccache -z
      shell: bash
